name: Validate Scoring Prompt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-prompt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check prompt file exists
        run: |
          if [ ! -f "prompts/scoring_prompt.txt" ]; then
            echo "ERROR: scoring_prompt.txt not found"
            exit 1
          fi
          echo "Prompt file found"

      - name: Check prompt is not empty
        run: |
          if [ ! -s "prompts/scoring_prompt.txt" ]; then
            echo "ERROR: scoring_prompt.txt is empty"
            exit 1
          fi
          echo "Prompt file is not empty"

      - name: Check prompt contains required fields
        run: |
          if ! grep -q "title" prompts/scoring_prompt.txt; then
            echo "ERROR: prompt missing title placeholder"
            exit 1
          fi
          if ! grep -q "company" prompts/scoring_prompt.txt; then
            echo "ERROR: prompt missing company placeholder"
            exit 1
          fi
          if ! grep -q "score" prompts/scoring_prompt.txt; then
            echo "ERROR: prompt missing score instruction"
            exit 1
          fi
          echo "All required fields present"

      - name: Run live Claude API integration test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request

          with open("prompts/scoring_prompt.txt") as f:
              prompt = f.read()

          test_input = prompt + "\n\nTitle: Senior Program Manager\nCompany: Stripe\nLocation: Warsaw, Poland\nRole type: Program Manager"

          payload = json.dumps({
              "model": "claude-sonnet-4-6",
              "max_tokens": 256,
              "messages": [{"role": "user", "content": test_input}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as res:
              data = json.loads(res.read())

          text = data["content"][0]["text"]
          print("Raw response:", text)

          result = json.loads(text)
          assert "score" in result, "Missing score"
          assert "reason" in result, "Missing reason"
          assert "verdict" in result, "Missing verdict"
          assert isinstance(result["score"], int), "Score must be integer"
          assert result["verdict"] in ["Apply", "Consider", "Skip"], "Invalid verdict"

          print("Integration test passed")
          print("Score:", result["score"])
          print("Verdict:", result["verdict"])
          print("Reason:", result["reason"])
          EOF